[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
gas_reports = ["ReputationRegistry", "ReputationAttestor", "ReputationAnalyzer"]
auto_detect_solc = true
auto_detect_remappings = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"

[fuzz]
runs = 256
seed = "0x1"
